<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物洗护门店预约系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🐾 宠物洗护门店预约系统</h1>
            <nav class="nav">
                <button class="nav-btn active" data-page="stations">工位预约</button>
                <button class="nav-btn" data-page="booking">预约管理</button>
                <button class="nav-btn" data-page="billing">账单结算</button>
                <button class="nav-btn" data-page="discounts">折扣管理</button>
            </nav>
        </header>

        <main class="main">
            <div id="page-stations" class="page active">
                <div class="page-header">
                    <h2>门店工位平面图 <span class="module-badge">3853</span></h2>
                    <div class="date-selector">
                        <label>选择日期：</label>
                        <input type="date" id="booking-date">
                    </div>
                </div>
                
                <div class="legend">
                    <span class="legend-item"><span class="legend-color available"></span> 可用</span>
                    <span class="legend-item"><span class="legend-color occupied"></span> 已占用</span>
                    <span class="legend-item"><span class="legend-color selected"></span> 已选中</span>
                    <span class="legend-item"><span class="legend-color maintenance"></span> 维护中</span>
                </div>

                <div class="stations-layout">
                    <div class="station-group">
                        <h3>洗护区 (A)</h3>
                        <div class="stations-row" id="wash-stations"></div>
                    </div>
                    <div class="station-group">
                        <h3>吹干区 (B)</h3>
                        <div class="stations-row" id="dry-stations"></div>
                    </div>
                    <div class="station-group">
                        <h3>美容区 (C)</h3>
                        <div class="stations-row" id="groom-stations"></div>
                    </div>
                </div>

                <div id="timeslot-panel" class="timeslot-panel hidden">
                    <h3 id="selected-station-name">选择时段</h3>
                    <div class="time-selector">
                        <div class="time-input-group">
                            <label>开始时间</label>
                            <select id="start-time"></select>
                        </div>
                        <div class="time-input-group">
                            <label>结束时间</label>
                            <select id="end-time"></select>
                        </div>
                    </div>
                    <div id="timeslots-container" class="timeslots-grid"></div>
                    <button id="show-booking-form" class="btn btn-primary" disabled>前往预约</button>
                </div>
            </div>

            <div id="page-booking" class="page">
                <div class="page-header">
                    <h2>预约表单</h2>
                </div>
                
                <div class="booking-summary" id="booking-summary">
                    <h3>预约信息</h3>
                    <p><strong>工位：</strong><span id="summary-station">-</span></p>
                    <p><strong>日期：</strong><span id="summary-date">-</span></p>
                    <p><strong>时段：</strong><span id="summary-time">-</span></p>
                </div>

                <form id="booking-form" class="form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>客户姓名 *</label>
                            <input type="text" id="customer-name" required>
                        </div>
                        <div class="form-group">
                            <label>联系电话 *</label>
                            <input type="tel" id="customer-phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>宠物名称 *</label>
                            <input type="text" id="pet-name" required>
                        </div>
                        <div class="form-group">
                            <label>宠物体型 *</label>
                            <select id="pet-size" required></select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>附加服务</label>
                        <div id="extra-services" class="checkbox-group"></div>
                    </div>

                    <div class="price-preview">
                        <h4>预估费用</h4>
                        <div id="price-breakdown" class="price-breakdown"></div>
                        <div class="price-total">
                            <span>预估总价：</span>
                            <span class="total-amount" id="estimated-total">¥0.00</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="back-to-stations">返回选工位</button>
                        <button type="submit" class="btn btn-primary">提交预约</button>
                    </div>
                </form>

                <div id="booking-list" class="booking-list">
                    <h3>今日预约</h3>
                    <div id="bookings-container"></div>
                </div>
            </div>

            <div id="page-billing" class="page">
                <div class="page-header">
                    <h2>账单结算</h2>
                </div>

                <div class="billing-section">
                    <h3>快速核算</h3>
                    <div class="quick-calc">
                        <div class="form-group">
                            <label>宠物体型</label>
                            <select id="quick-pet-size"></select>
                        </div>
                        <div class="form-group">
                            <label>附加服务</label>
                            <div id="quick-extra-services" class="checkbox-group"></div>
                        </div>
                        <div class="quick-result">
                            <span>核算金额：</span>
                            <span class="total-amount" id="quick-result">¥0.00</span>
                        </div>
                    </div>
                </div>

                <div class="billing-section">
                    <h3>预约账单</h3>
                    <div id="bills-container"></div>
                </div>
            </div>

            <div id="page-discounts" class="page">
                <div class="page-header">
                    <h2>折扣规则管理</h2>
                </div>

                <div class="discount-form">
                    <h3>新增折扣规则</h3>
                    <form id="discount-form" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>规则名称 *</label>
                                <input type="text" id="discount-name" required>
                            </div>
                            <div class="form-group">
                                <label>规则类型 *</label>
                                <select id="discount-type" required>
                                    <option value="percentage">折扣百分比</option>
                                    <option value="fixed">固定金额减免</option>
                                    <option value="threshold">满减</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>优惠值 *</label>
                                <input type="number" id="discount-value" min="0" step="0.01" required>
                            </div>
                            <div class="form-group" id="threshold-group">
                                <label>满减门槛</label>
                                <input type="number" id="discount-threshold" min="0" step="0.01">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>规则描述</label>
                            <textarea id="discount-description" rows="2"></textarea>
                        </div>
                        <div class="form-group checkbox-inline">
                            <label>
                                <input type="checkbox" id="discount-enabled" checked>
                                立即启用
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary">添加规则</button>
                    </form>
                </div>

                <div class="discount-list">
                    <h3>现有规则</h3>
                    <div id="discounts-container"></div>
                </div>
            </div>
        </main>

        <div id="toast" class="toast hidden"></div>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span class="modal-close" id="modal-close">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/stations.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/discounts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
